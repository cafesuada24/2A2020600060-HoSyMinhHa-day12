# ============================================================
# railway.toml — Railway deployment configuration
#
# Docs: https://docs.railway.com/reference/config-as-code
# ============================================================

[build]
# Dùng Dockerfile để đảm bảo bảo mật (non-root user) và tối ưu hóa qua uv
builder = "DOCKERFILE"

[deploy]
# ✅ Start command — Sử dụng uv run và trỏ đúng module app.main:app
startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"

# Health check — Đồng bộ với endpoint trong app/main.py
healthcheckPath = "/health"
healthcheckTimeout = 30

# Tự động restart khi crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ============================================================
# Environment variables CẦN THIẾT cho Production:
#   railway variables set ENVIRONMENT=production
#   railway variables set AGENT_API_KEY=... (Bắt buộc ở production)
#   railway variables set JWT_SECRET=...      (Bắt buộc ở production)
#   railway variables set OPENAI_API_KEY=sk-...
# ============================================================
